        <p>推荐题：：回文质数<br><a href="https://www.luogu.org/problemnew/show/P1217" target="_blank" rel="noopener">点这里</a><br>代码</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br></pre></td><td class="code"><pre><span class="line">#include &lt;bits/stdc++.h&gt;</span><br><span class="line"></span><br><span class="line">using namespace std;</span><br><span class="line"></span><br><span class="line">#define MAXX 10000010</span><br><span class="line"></span><br><span class="line">inline int read()</span><br><span class="line">&#123;</span><br><span class="line">	int s = 0, w = 1;</span><br><span class="line">	char ch = getchar();</span><br><span class="line">	while(ch &lt; &apos;0&apos; || ch &gt; &apos;9&apos;) &#123; if(ch == &apos;-&apos;) w = -1; ch = getchar(); &#125;</span><br><span class="line">	while(ch &gt;= &apos;0&apos; &amp;&amp; ch &lt;= &apos;9&apos;) &#123; s = (s &lt;&lt; 1) + (s &lt;&lt; 3) + ch - &apos;0&apos;; ch = getchar(); &#125;</span><br><span class="line">	return s * w;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int prime[MAXX];</span><br><span class="line">bool pp[MAXX];</span><br><span class="line">int vis[MAXX];</span><br><span class="line">int x, y;</span><br><span class="line">int cnt = 0;</span><br><span class="line"></span><br><span class="line">bool H_w(int k)</span><br><span class="line">&#123;</span><br><span class="line">	int p = k, num = 0;</span><br><span class="line">	while(p != 0) </span><br><span class="line">	&#123;</span><br><span class="line">		num = num * 10 + p % 10;</span><br><span class="line">		p /= 10;</span><br><span class="line">	&#125;</span><br><span class="line">	if(num == k) return true;</span><br><span class="line">	else return false;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int main()</span><br><span class="line">&#123;</span><br><span class="line">	memset(vis, 0, sizeof(vis));</span><br><span class="line">	x = read(); </span><br><span class="line">	y = read();</span><br><span class="line">	if(y &gt; 10000000) y = 10000000;</span><br><span class="line">	for(int i = 2; i &lt;= y; ++i)</span><br><span class="line">	&#123;</span><br><span class="line">		if(!vis[i])</span><br><span class="line">		&#123;</span><br><span class="line">			prime[cnt++] = i;</span><br><span class="line">			pp[i] = 1;</span><br><span class="line">		&#125;</span><br><span class="line">		for(int j = 0; j &lt; cnt &amp;&amp; i * prime[j] &lt;= y; ++j)</span><br><span class="line">		&#123;</span><br><span class="line">			vis[i * prime[j]] = i;</span><br><span class="line">			if(i % prime[j] == 0) break;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	for(int i = x; i &lt;= y; ++i)</span><br><span class="line">	&#123; </span><br><span class="line">		if(i &gt; 10000000) break;</span><br><span class="line">		else if(H_w(i) &amp;&amp; pp[i])</span><br><span class="line">		&#123;</span><br><span class="line">			printf(&quot;%d\n&quot;, i);</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
