<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br></pre></td><td class="code"><pre><span class="line">#include &lt;bits/stdc++.h&gt;//Floyd</span><br><span class="line"></span><br><span class="line">using namespace std;</span><br><span class="line"></span><br><span class="line">#define MAXX 10100</span><br><span class="line"></span><br><span class="line">int n, m, s;</span><br><span class="line">int f, g, w;</span><br><span class="line">int a[MAXX][MAXX];</span><br><span class="line">const int inf = 123456789;</span><br><span class="line"></span><br><span class="line">int main() &#123;</span><br><span class="line">	scanf(&quot;%d %d %d&quot;, &amp;n, &amp;m, &amp;s);</span><br><span class="line">	for(int i = 1; i &lt;= n; ++i) &#123;</span><br><span class="line">		for(int j = 1; j &lt;= n; ++j) &#123;</span><br><span class="line">			if(i == j) a[i][j] = 0;</span><br><span class="line">			else if(i != j) a[i][j] = inf;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	for(int i = 1; i &lt;= m; ++i) &#123;</span><br><span class="line">		scanf(&quot;%d %d %d&quot;, &amp;f, &amp;g, &amp;w);</span><br><span class="line">		if(a[f][g] &gt; w) a[f][g] = w;</span><br><span class="line">	&#125;</span><br><span class="line">	for(int k = 1; k &lt;= n; ++k) &#123;</span><br><span class="line">		for(int i = 1; i &lt;= n; ++i) &#123;</span><br><span class="line">			if(i == k || a[i][k] == inf) continue;</span><br><span class="line">			else &#123;</span><br><span class="line">				for(int j = 1; j &lt;= n; ++j) &#123;</span><br><span class="line">					if(a[i][k] + a[k][j] &lt; a[i][j]) a[i][j] = a[i][k] + a[k][j];</span><br><span class="line">				&#125;</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	for(int i = 1; i &lt;= n; ++i) &#123;</span><br><span class="line">		printf(&quot;%d &quot;, a[s][i]);</span><br><span class="line">	&#125;</span><br><span class="line">	return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
